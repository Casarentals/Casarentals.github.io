<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feed — Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="casa.css">
<style>
  /* ── Page head ── */
  .feed-head { padding: 36px 0 24px; border-bottom: 1px solid var(--rule); }
  .feed-head .top { display: flex; align-items: end; justify-content: space-between; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
  .feed-head h1 { font-family: var(--serif); font-size: 64px; line-height: 0.95; letter-spacing: -0.025em; }
  .feed-head h1 i { font-style: italic; color: var(--brick); }
  .feed-head .h-meta { font-size: 13.5px; color: var(--ink-3); text-align: right; }
  .feed-head .h-meta .n { font-family: var(--serif); font-style: italic; color: var(--brick); font-size: 22px; }

  /* County tabs — pill row */
  .county-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 2px 0; }
  .county-bar::-webkit-scrollbar { display: none; }
  .county-pill {
    flex-shrink: 0; padding: 9px 16px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--rule);
    font-size: 13px; color: var(--ink-2); cursor: pointer; white-space: nowrap;
    transition: all .12s; display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .county-pill:hover { border-color: var(--ink); color: var(--ink); }
  .county-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 500; }
  .county-pill .ct { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; opacity: 0.55; }

  /* ── Layout ── */
  .feed-layout { display: grid; grid-template-columns: 240px 1fr 320px; gap: 32px; padding: 28px 0 80px; }

  /* LEFT — type filter + nation */
  .feed-side { position: sticky; top: 88px; height: fit-content; }
  .side-sect { margin-bottom: 28px; }
  .side-sect h5 { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; padding-left: 12px; }
  .side-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 9px;
    font-size: 13.5px; color: var(--ink-2); text-decoration: none;
    transition: background .1s; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
    font-family: var(--sans);
  }
  .side-link:hover { background: var(--surface); color: var(--ink); }
  .side-link.active { background: var(--brick-pale); color: var(--brick-text); font-weight: 500; }
  .side-link.active svg { color: var(--brick); }
  .side-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }
  .side-link .ct { margin-left: auto; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; color: var(--ink-4); }
  .side-link.active .ct { color: var(--brick); }

  /* ── MIDDLE — feed ── */
  .feed-col { min-width: 0; }

  /* Compose */
  .compose {
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 16px; padding: 18px 20px; margin-bottom: 20px;
  }
  .compose .row1 { display: flex; gap: 12px; align-items: flex-start; }
  .compose .av { width: 40px; height: 40px; border-radius: 50%; background: var(--brick); color: white; display: inline-flex; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; font-size: 17px; flex-shrink: 0; }
  .compose textarea {
    flex: 1; border: none; background: transparent; outline: none; resize: none;
    font-family: var(--sans); font-size: 14.5px; color: var(--ink); padding: 8px 0 4px;
    min-height: 50px; line-height: 1.5;
  }
  .compose textarea::placeholder { color: var(--ink-4); }
  .compose textarea::placeholder i { font-style: italic; color: var(--brick); }
  .compose .row2 { display: flex; align-items: center; gap: 6px; padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--rule); }
  .compose .post-type-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--rule); background: transparent;
    font-family: var(--sans); font-size: 12px; color: var(--ink-3);
    transition: all .12s;
  }
  .compose .post-type-pill:hover { border-color: var(--ink); color: var(--ink); }
  .compose .post-type-pill.on { background: var(--brick-pale); color: var(--brick-text); border-color: var(--brick); }
  .compose .post-type-pill svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .compose .post-btn {
    margin-left: auto; background: var(--brick); color: white;
    border: none; border-radius: 999px; padding: 8px 18px;
    font-family: var(--sans); font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: background .12s;
  }
  .compose .post-btn:hover { background: var(--brick-2); }

  /* Tabs */
  .feed-tabs {
    display: flex; gap: 0; align-items: center; margin-bottom: 18px;
    border-bottom: 1px solid var(--rule); padding-bottom: 0;
  }
  .feed-tab {
    padding: 12px 18px; font-size: 13.5px; color: var(--ink-3);
    cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color .12s, border-color .12s;
    background: none; border-left: none; border-right: none; border-top: none;
    font-family: var(--sans);
  }
  .feed-tab:hover { color: var(--ink); }
  .feed-tab.active { color: var(--brick); border-bottom-color: var(--brick); font-weight: 500; }
  .feed-tab .ct { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; opacity: 0.55; margin-left: 4px; }
  .feed-sort-spacer { flex: 1; }
  .feed-sort { display: flex; align-items: center; gap: 6px; padding: 8px 12px; font-size: 12.5px; color: var(--ink-3); }
  .feed-sort select { border: none; background: transparent; font-family: var(--sans); font-size: 12.5px; color: var(--ink); font-weight: 500; outline: none; cursor: pointer; }

  /* Post card */
  .post {
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 16px; margin-bottom: 14px; overflow: hidden;
    transition: border-color .15s;
  }
  .post:hover { border-color: var(--rule-3); }
  .post .ph-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px 4px; }
  .post .av {
    width: 40px; height: 40px; border-radius: 50%; background: var(--brick); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; font-size: 16px; flex-shrink: 0;
  }
  .post .av.guest { background: var(--moss); }
  .post .av.ink { background: var(--ink); }
  .post .who { flex: 1; min-width: 0; }
  .post .who .nm { display: flex; align-items: center; gap: 6px; font-size: 14px; flex-wrap: wrap; }
  .post .who .nm .name { font-weight: 500; color: var(--ink); }
  .post .who .nm .name i { font-style: italic; color: var(--brick); font-weight: 400; }
  .post .who .meta-line { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .post .who .meta-line .when { font-family: var(--mono); letter-spacing: 0.06em; font-size: 10px; text-transform: uppercase; }
  .post .who .meta-line .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); }
  .post .more-btn { background: none; border: none; color: var(--ink-4); cursor: pointer; padding: 6px; }
  .post .more-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  .post .body { padding: 6px 20px 14px; font-size: 14.5px; line-height: 1.55; color: var(--ink); }
  .post .body i.tag { font-style: italic; color: var(--brick); cursor: pointer; font-weight: 400; }
  .post .body i.tag:hover { text-decoration: underline; text-underline-offset: 2px; }
  .post .body p + p { margin-top: 6px; }

  /* Post type — small label */
  .post-type {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px; margin-right: 4px;
  }
  .post-type.avail { background: var(--brick-pale); color: var(--brick-text); }
  .post-type.looking { background: var(--moss-pale); color: var(--moss); }
  .post-type.review { background: rgba(184,150,86,0.18); color: #7C6432; }
  .post-type.tip { background: rgba(22,20,15,0.08); color: var(--ink-2); }
  .post-type.photo { background: rgba(176,85,51,0.16); color: var(--brick); }
  .post-type svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Attached property */
  .post-prop {
    margin: 0 20px 14px; display: flex; gap: 12px;
    background: var(--paper); border: 1px solid var(--rule); border-radius: 12px; padding: 10px;
    text-decoration: none; color: inherit; cursor: pointer; transition: border-color .12s;
  }
  .post-prop:hover { border-color: var(--ink); }
  .post-prop .pi { width: 80px; height: 64px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .post-prop .pi .ph { width: 100%; height: 100%; }
  .post-prop .pinfo { flex: 1; min-width: 0; }
  .post-prop .pname { font-family: var(--serif); font-size: 16px; line-height: 1.1; margin-bottom: 2px; }
  .post-prop .pname i { font-style: italic; color: var(--brick); }
  .post-prop .pdets { font-size: 11.5px; color: var(--ink-3); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .post-prop .pdets svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .post-prop .price-pill { font-family: var(--serif); font-size: 17px; align-self: center; padding: 0 6px; }
  .post-prop .price-pill i { font-style: italic; color: var(--brick); }
  .post-prop .price-pill .per { font-family: var(--sans); font-style: normal; font-size: 10px; color: var(--ink-3); margin-left: 2px; }

  /* Image attachment */
  .post-images { display: grid; gap: 4px; margin: 0 20px 14px; border-radius: 12px; overflow: hidden; }
  .post-images.one { grid-template-columns: 1fr; }
  .post-images.two { grid-template-columns: 1fr 1fr; }
  .post-images.three { grid-template-columns: 1fr 1fr 1fr; }
  .post-images.four { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .post-images .ph { aspect-ratio: 4/3; }
  .post-images.one .ph { aspect-ratio: 16/9; }

  /* Review specific */
  .post-review {
    margin: 0 20px 14px; padding: 14px 16px; background: var(--paper);
    border-left: 3px solid var(--brick); border-radius: 0 12px 12px 0;
  }
  .post-review .rating { display: inline-flex; gap: 2px; margin-bottom: 8px; }
  .post-review .rating svg { width: 14px; height: 14px; fill: var(--brick); stroke: none; }
  .post-review p { font-family: var(--serif); font-size: 16px; line-height: 1.5; color: var(--ink); margin-bottom: 8px; }
  .post-review p i { font-style: italic; color: var(--brick); }
  .post-review .stayed-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }

  /* Actions */
  .post-actions { display: flex; align-items: center; padding: 6px 12px 10px; gap: 2px; border-top: 1px solid var(--rule-2); margin-top: 4px; }
  .post-action {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    background: none; border: none; font-family: var(--sans); font-size: 12.5px;
    color: var(--ink-3); transition: background .1s, color .1s;
  }
  .post-action:hover { background: var(--paper); color: var(--ink); }
  .post-action.saved { color: var(--brick); }
  .post-action svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .post-action.liked svg { fill: var(--brick); stroke: var(--brick); }
  .post-action .ct { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; opacity: 0.7; }
  .post-action.enquire { margin-left: auto; background: var(--brick); color: white; padding: 6px 14px; font-size: 12.5px; font-weight: 500; text-decoration: none; border-radius: 8px; text-align: center; }
  .post-action.enquire:hover { background: var(--brick-2); color: white; }

  /* ── RIGHT — county info ── */
  .feed-aside { position: sticky; top: 88px; height: fit-content; }
  .county-card {
    background: var(--ink); color: var(--paper);
    border-radius: 18px; padding: 24px; margin-bottom: 14px;
    position: relative; overflow: hidden;
  }
  .county-card::before {
    content: ''; position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle at center, rgba(176,85,51,0.22), transparent 65%);
  }
  .county-card .eye { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 8px; position: relative; }
  .county-card h3 { font-family: var(--serif); font-size: 38px; line-height: 0.95; letter-spacing: -0.02em; margin-bottom: 8px; position: relative; }
  .county-card h3 i { font-style: italic; color: var(--brick-2); }
  .county-card p { font-size: 13.5px; line-height: 1.5; color: rgba(255,255,255,0.75); margin-bottom: 16px; position: relative; }
  .county-card p i { font-style: italic; color: var(--brick-2); }
  .county-card .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.12); position: relative; }
  .county-card .stat .n { font-family: var(--serif); font-style: italic; color: var(--brick-2); font-size: 22px; line-height: 1; }
  .county-card .stat .l { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 4px; }

  .aside-block { background: var(--surface); border: 1px solid var(--rule); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
  .aside-block h4 { font-family: var(--serif); font-size: 18px; line-height: 1; margin-bottom: 12px; }
  .aside-block h4 i { font-style: italic; color: var(--brick); }
  .aside-block .trend-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--ink-2); border-top: 1px solid var(--rule-2); cursor: pointer; }
  .aside-block .trend-row:first-of-type { border-top: 1px solid var(--rule); padding-top: 10px; margin-top: 4px; }
  .aside-block .trend-row:hover .tn { color: var(--brick); }
  .aside-block .trend-row .tn { font-family: var(--serif); font-style: italic; color: var(--brick); transition: color .12s; }
  .aside-block .trend-row .tc { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--ink-4); }

  /* Active hosts */
  .ah-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--rule-2); }
  .ah-row:first-of-type { border-top: 1px solid var(--rule); padding-top: 10px; margin-top: 4px; }
  .ah-row .av { width: 32px; height: 32px; border-radius: 50%; background: var(--brick); color: white; display: inline-flex; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; font-size: 13px; flex-shrink: 0; }
  .ah-row .info { flex: 1; min-width: 0; }
  .ah-row .info .n { font-size: 13px; font-weight: 500; }
  .ah-row .info .n i { font-style: italic; color: var(--brick); font-weight: 400; }
  .ah-row .info .m { font-size: 10.5px; color: var(--ink-3); font-family: var(--mono); letter-spacing: 0.06em; text-transform: uppercase; }
  .ah-row .follow-btn { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--rule-3); background: transparent; cursor: pointer; color: var(--ink-2); font-family: var(--sans); }
  .ah-row .follow-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .ah-row .follow-btn.following { background: var(--moss-pale); color: var(--moss); border-color: var(--moss-pale); }

  /* Live notice */
  .live-notice {
    background: var(--brick); color: white;
    border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
    font-size: 13px; display: flex; gap: 10px; align-items: flex-start;
  }
  .live-notice .ic { width: 28px; height: 28px; background: rgba(255,255,255,0.15); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .live-notice .ic svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 1.8; }
  .live-notice strong { font-family: var(--serif); font-style: italic; font-weight: 400; }

  @media (max-width: 1100px) {
    .feed-layout { grid-template-columns: 1fr; }
    .feed-side { position: relative; }
    .feed-aside { position: relative; }
  }

  /* ─── INTEGRATED COMMUNITY STYLES ─── */
  
  /* Inline Reply/Comment Drawer */
  .reply-thread {
    background: var(--paper); border-top: 1px solid var(--rule-2);
    padding: 16px 20px; display: none; flex-direction: column; gap: 12px;
  }
  .reply-thread.open { display: flex; }
  .reply-card { display: flex; gap: 10px; font-size: 13px; line-height: 1.45; }
  .reply-card .av { width: 26px; height: 26px; font-size: 11px; border-radius: 50%; background: var(--brick); color: white; display: inline-flex; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; flex-shrink: 0; }
  .reply-card .av.guest { background: var(--moss); }
  .reply-card .r-content { flex: 1; color: var(--ink); }
  .reply-card .r-content strong { font-weight: 600; color: var(--ink); }
  .reply-card .r-meta { font-size: 11px; color: var(--ink-4); font-family: var(--mono); margin-top: 2px; }
  
  .reply-form { display: flex; gap: 10px; margin-top: 6px; border-top: 1px solid var(--rule); padding-top: 12px; }
  .reply-form input {
    flex: 1; border: 1px solid var(--rule-3); background: var(--surface);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; outline: none;
    font-family: var(--sans); color: var(--ink); transition: border-color 0.12s;
  }
  .reply-form input:focus { border-color: var(--brick); }
  .reply-form button {
    background: var(--ink); color: var(--paper); border: none; border-radius: 999px;
    padding: 6px 14px; font-size: 12.5px; font-weight: 500; cursor: pointer; font-family: var(--sans);
  }

  /* Right-hand Authentic Profile Drawer */
  .profile-drawer-overlay {
    position: fixed; inset: 0; background: rgba(22, 20, 15, 0.35);
    backdrop-filter: blur(4px); z-index: 2000; opacity: 0; pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .profile-drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .profile-drawer {
    position: fixed; top: 0; right: -420px; width: 420px; height: 100%;
    background
